<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Treino — Nathan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0A0A0A;
      --surface:      #131313;
      --card:         #1A1A1A;
      --border:       rgba(255,255,255,0.06);
      --border-md:    rgba(255,255,255,0.10);
      --border-str:   rgba(255,255,255,0.14);
      --text-1:       #F2F2F2;
      --text-2:       #848484;
      --text-3:       #4A4A4A;
      --push:         #F5A624;
      --push-bg:      rgba(245,166,36,0.10);
      --push-bd:      rgba(245,166,36,0.28);
      --pull:         #00CFA1;
      --pull-bg:      rgba(0,207,161,0.09);
      --pull-bd:      rgba(0,207,161,0.26);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      padding: 28px 22px 0;
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, var(--bg) 78%, transparent 100%);
    }

    .header-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 4px;
    }

    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 46px;
      line-height: 0.92;
      letter-spacing: 0.03em;
    }

    .header-title .accent { color: var(--push); }

    .header-weeks {
      font-size: 11px;
      color: var(--text-3);
    }

    /* ── DAY TABS ── */
    .days-bar {
      display: flex;
      gap: 6px;
      padding: 14px 22px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .days-bar::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      border: 1px solid var(--border-str);
      background: transparent;
      border-radius: 100px;
      padding: 6px 16px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      transition: all 0.18s ease;
      white-space: nowrap;
      position: relative;
    }

    .day-tab.today::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-3);
    }

    .day-tab.ap { background: var(--push-bg); border-color: var(--push-bd); color: var(--push); }
    .day-tab.ap.today::after { background: var(--push); }
    .day-tab.al { background: var(--pull-bg); border-color: var(--pull-bd); color: var(--pull); }
    .day-tab.al.today::after { background: var(--pull); }
    .day-tab.ar { background: rgba(255,255,255,0.03); border-color: var(--border-str); color: var(--text-2); }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 4px 16px 40px;
      overflow-y: auto;
    }

    .panel { animation: fadeUp 0.22s ease forwards; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DAY HEADER ── */
    .day-hero { padding: 10px 6px 18px; }

    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 10px;
      border: 1px solid;
    }
    .tb-push { background: var(--push-bg); border-color: var(--push-bd); color: var(--push); }
    .tb-pull { background: var(--pull-bg); border-color: var(--pull-bd); color: var(--pull); }
    .tb-rest { background: rgba(255,255,255,0.03); border-color: var(--border-str); color: var(--text-3); }

    .day-name-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 0.88;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    .day-focus { font-size: 13px; color: var(--text-2); font-weight: 300; }

    .muscles-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 12px;
    }

    .m-chip {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border-md);
      color: var(--text-3);
    }

    /* ── PROGRESS ── */
    .progress-block { margin-bottom: 4px; }
    .prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
    .prog-bar { height: 2px; background: var(--border-str); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .pf-push { background: var(--push); }
    .pf-pull { background: var(--pull); }

    /* ── SECTION LABEL ── */
    .slabel {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 18px 0 10px 2px;
    }

    /* ── EXERCISE CARD ── */
    .ex {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: opacity 0.25s, border-color 0.2s;
    }
    .ex.done { opacity: 0.38; }

    .ex-main {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px 12px;
    }

    .ex-n {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      line-height: 1;
      min-width: 26px;
      text-align: right;
      padding-top: 1px;
      flex-shrink: 0;
    }
    .n-push { color: var(--push); }
    .n-pull { color: var(--pull); }

    .ex-body { flex: 1; min-width: 0; }

    .ex-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .ex-cue {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 300;
      line-height: 1.55;
    }

    .ex-pills {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 100px;
      white-space: nowrap;
    }
    .p-sets { background: rgba(255,255,255,0.05); color: var(--text-2); }
    .p-push { background: var(--push-bg); color: var(--push); }
    .p-pull { background: var(--pull-bg); color: var(--pull); }

    .ex-foot {
      border-top: 1px solid var(--border);
      padding: 9px 13px 9px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ex-tip {
      flex: 1;
      font-size: 11px;
      color: var(--text-3);
      font-style: italic;
      line-height: 1.5;
    }

    .chk {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--border-str);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: transparent;
      font-size: 14px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .chk.cp { background: var(--push); border-color: var(--push); color: #000; }
    .chk.cl { background: var(--pull); border-color: var(--pull); color: #000; }

    /* ── REST DAY ── */
    .rest-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 24px;
      text-align: center;
      margin-top: 4px;
    }
    .rest-emoji { font-size: 48px; margin-bottom: 14px; }
    .rest-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.03em;
      color: var(--text-2);
      margin-bottom: 10px;
    }
    .rest-body { font-size: 13px; color: var(--text-3); line-height: 1.8; }
    .rest-body strong { color: var(--text-2); font-weight: 500; }

    /* ── INFO BOX ── */
    .info-box {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 10px;
    }
    .info-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 5px;
    }
    .info-text { font-size: 12px; color: var(--text-2); line-height: 1.65; }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 10px;
      text-align: center;
    }
    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1;
      margin-bottom: 3px;
    }
    .stat-val.sp { color: var(--push); }
    .stat-val.sl { color: var(--pull); }
    .stat-val.sg { color: var(--text-2); }
    .stat-lbl { font-size: 10px; color: var(--text-3); font-weight: 300; }

    /* ── WEEK OVERVIEW ── */
    .week-strip {
      display: flex;
      gap: 4px;
      padding: 12px 22px 8px;
      justify-content: center;
    }
    .ws-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }
    .ws-pip {
      width: 100%;
      height: 3px;
      border-radius: 2px;
      max-width: 48px;
    }
    .ws-pip.wp { background: var(--push); opacity: 0.4; }
    .ws-pip.wl { background: var(--pull); opacity: 0.4; }
    .ws-pip.wr { background: var(--border-str); }
    .ws-pip.active.wp { opacity: 1; }
    .ws-pip.active.wl { opacity: 1; }
    .ws-lbl { font-size: 9px; color: var(--text-3); letter-spacing: 0.05em; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-eyebrow">Plano Push / Pull · Hipertrofia</div>
    <div class="header-row">
      <div class="header-title">Seu <span class="accent">Treino</span></div>
      <div class="header-weeks">Semana 1</div>
    </div>
  </div>

  <div class="week-strip" id="weekStrip"></div>

  <div class="days-bar" id="daysBar"></div>

  <div class="content" id="content"></div>

</div>

<script>
const DAYS = ['seg','ter','qua','qui','sex'];
const LABELS = ['Seg','Ter','Qua','Qui','Sex'];
const DAY_NAMES = { 1:'seg', 2:'ter', 3:'qua', 4:'qui', 5:'sex' };

const W = {
  seg: {
    type: 'push', badge: 'Push A · Empurrar',
    name: 'Segunda', focus: 'Peito · Ombros · Tríceps',
    muscles: ['Peitoral maior','Deltóide anterior','Deltóide lateral','Tríceps braquial'],
    rest: '60–90s para isoladores (elevação, tríceps) · 90–120s para compostos (chest press, shoulder press)',
    exercises: [
      { name:'Chest Press na máquina',         sets:3, reps:'10–12', cue:'Cotovelos a 45° do tronco, peito projetado pra frente',              tip:'Foque em sentir o peito contraindo, não os ombros' },
      { name:'Shoulder Press na máquina',       sets:3, reps:'10–12', cue:'Empurra acima da cabeça sem travar os cotovelos',                    tip:'Ajuste o assento pra que as alças fiquem na altura dos ombros' },
      { name:'Elevação lateral no cabo (baixo)',sets:3, reps:'15',    cue:'Cabo do lado contrário, cotovelo levemente flexionado',              tip:'Sobe até a altura do ombro, não mais. Controle a descida.' },
      { name:'Tríceps pulley — corda',          sets:3, reps:'12–15', cue:'Cotovelos fixos ao lado do tronco, abre a corda no final',           tip:'A abertura no final aumenta o pico de contração do tríceps' },
      { name:'Tríceps na máquina',              sets:3, reps:'12–15', cue:'Extensão completa, descida controlada sem bater o peso',             tip:'Se não tiver máquina, substitua por tríceps testa no cabo' },
    ]
  },
  ter: {
    type: 'pull', badge: 'Pull A · Puxar',
    name: 'Terça', focus: 'Costas · Bíceps · Ombro posterior',
    muscles: ['Latíssimo do dorso','Trapézio médio','Rombóide','Bíceps braquial','Deltóide posterior'],
    rest: '60–90s para bíceps e face pull · 90–120s para puxada e remada',
    exercises: [
      { name:'Puxada frontal na polia (Lat Pulldown)', sets:4, reps:'10–12', cue:'Barra larga, puxe até o queixo, peito projetado pra frente',     tip:'Melhor exercício de costas em máquina pra iniciante. Priorize.' },
      { name:'Remada sentada na polia',                sets:3, reps:'10–12', cue:'Costas eretas, puxe até o abdômen, espreme as escápulas no final', tip:'Não balance o tronco. O movimento parte dos cotovelos.' },
      { name:'Face pull no cabo — corda',              sets:3, reps:'15',    cue:'Polia na altura dos olhos, puxe até o rosto abrindo cotovelos',   tip:'Essencial pra saúde dos ombros e pra construir o deltóide posterior' },
      { name:'Rosca direta no cabo',                   sets:3, reps:'12–15', cue:'Polia baixa, cotovelos fixos, curl completo até o ombro',          tip:'Cabo mantém tensão constante — superior ao haltere pra hipertrofia' },
      { name:'Rosca scott na máquina',                 sets:3, reps:'12–15', cue:'Cotovelo apoiado, extensão total na descida, contração no topo',   tip:'A extensão completa no final é o que mais estimula o bíceps' },
    ]
  },
  qua: {
    type: 'rest', badge: 'Descanso',
    name: 'Quarta', focus: 'Recuperação ativa',
    muscles: [], rest: '', exercises: []
  },
  qui: {
    type: 'push', badge: 'Push B · Empurrar',
    name: 'Quinta', focus: 'Ombros · Peito · Tríceps (variação)',
    muscles: ['Deltóide lateral','Deltóide anterior','Peitoral (longa tensão)','Tríceps longa cabeça'],
    rest: '60–90s para isoladores · 90–120s para peck deck e shoulder press',
    exercises: [
      { name:'Peck Deck (Voador)',                        sets:3, reps:'12–15', cue:'Cotovelos levemente flexionados, esprema no ponto de contração', tip:'Traz alongamento máximo no peito — diferente do chest press' },
      { name:'Shoulder Press na máquina',                 sets:3, reps:'10–12', cue:'Mesma execução da segunda, busca progredir peso ou reps',        tip:'Repetir 2×/semana é o que acelera o crescimento de ombro' },
      { name:'Elevação lateral na máquina',               sets:3, reps:'15',    cue:'Cotovelos apoiados nos suportes, sobe até a horizontal',          tip:'Mais seguro que o cabo pra manter forma correta com cansaço' },
      { name:'Tríceps overhead no cabo — corda',          sets:3, reps:'12–15', cue:'Corpo inclinado à frente, estende os braços com cotovelos fixos',  tip:'Trabalha a longa cabeça — responsável por 60% do volume do braço' },
      { name:'Tríceps pulley — barra reta ou EZ',         sets:3, reps:'12–15', cue:'Polia alta, cotovelos fixos, descida até 90° e extensão total',   tip:'Alterna com a corda nas semanas pra mais variedade de estímulo' },
    ]
  },
  sex: {
    type: 'pull', badge: 'Pull B + Pernas',
    name: 'Sexta', focus: 'Costas · Bíceps · Pernas (base)',
    muscles: ['Latíssimo','Rombóide','Bíceps','Quadríceps','Isquiotibiais'],
    rest: '60–90s para bíceps · 90–120s para costas e pernas',
    exercises: [
      { name:'Puxada na máquina (Lat Machine)',  sets:4, reps:'10–12', cue:'Se o gym tiver máquina dedicada, usa aqui em vez da polia',     tip:'Ângulo diferente = mais estímulo total de costas na semana' },
      { name:'Remada cavalinho na máquina',      sets:3, reps:'10–12', cue:'Peito apoiado, cotovelos fechados ao corpo, puxe até o quadril', tip:'Apoio elimina balanço do tronco — execução mais limpa' },
      { name:'Rosca martelo no cabo',            sets:3, reps:'12–15', cue:'Pegada neutra (polegar pra cima), um braço de cada vez',         tip:'Trabalha braquial + braquiorradial — braço mais espesso' },
      { name:'Leg Press 45°',                    sets:3, reps:'12–15', cue:'Pés na largura dos ombros, desce até 90°, empurra sem travar',   tip:'Pernas são metade da massa muscular — não negligencie' },
      { name:'Leg Curl na máquina (deitado)',    sets:3, reps:'12–15', cue:'Calcanhar até o glúteo, descida controlada sem bater o peso',    tip:'Isquiotibiais protegem o joelho e equilibram o quadríceps' },
    ]
  }
};

let current = 'seg';
let checked = {};
const todayKey = DAY_NAMES[new Date().getDay()] || 'seg';

function totalSets(d) { return W[d].exercises.reduce((s,e) => s + e.sets, 0); }
function doneSets(d) { return Object.keys(checked).filter(k => k.startsWith(d+'-')).length; }

function buildWeekStrip() {
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = DAYS.map((d,i) => {
    const t = W[d].type;
    const cls = t === 'push' ? 'wp' : t === 'pull' ? 'wl' : 'wr';
    const act = d === current ? ' active' : '';
    return `<div class="ws-dot">
      <div class="ws-pip ${cls}${act}"></div>
      <div class="ws-lbl">${LABELS[i]}</div>
    </div>`;
  }).join('');
}

function buildTabs() {
  const bar = document.getElementById('daysBar');
  bar.innerHTML = DAYS.map((d,i) => {
    const t = W[d].type;
    const cls = d === current ? (t === 'push' ? ' ap' : t === 'pull' ? ' al' : ' ar') : '';
    const td = d === todayKey ? ' today' : '';
    return `<button class="day-tab${cls}${td}" onclick="show('${d}')">${LABELS[i]}</button>`;
  }).join('');
}

function buildContent() {
  const w = W[current];
  const t = w.type;
  const isRest = t === 'rest';
  const total = totalSets(current);
  const done = doneSets(current);

  let h = `<div class="panel">`;

  // Day hero
  h += `<div class="day-hero">
    <div class="type-badge tb-${t}">${w.badge}</div>
    <div class="day-name-big">${w.name}</div>
    <div class="day-focus">${w.focus}</div>`;
  if (w.muscles.length) {
    h += `<div class="muscles-row">${w.muscles.map(m=>`<span class="m-chip">${m}</span>`).join('')}</div>`;
  }
  h += `</div>`;

  if (isRest) {
    h += `<div class="rest-card">
      <div class="rest-emoji">🌙</div>
      <div class="rest-title">Dia de Descanso</div>
      <div class="rest-body">
        O músculo cresce no descanso, não na academia.<br><br>
        <strong>Priorize:</strong> sono de 7–9h · proteína ≥130g · hidratação.<br><br>
        Pode fazer uma caminhada leve ou 20min de alongamento se quiser se mexer.
      </div>
    </div>`;
  } else {
    // Stats
    const pct = total ? Math.round(done/total*100) : 0;
    h += `<div class="stats-row">
      <div class="stat"><div class="stat-val s${t==='push'?'p':'l'}">${w.exercises.length}</div><div class="stat-lbl">exercícios</div></div>
      <div class="stat"><div class="stat-val s${t==='push'?'p':'l'}">${total}</div><div class="stat-lbl">séries totais</div></div>
      <div class="stat"><div class="stat-val sg">${done}</div><div class="stat-lbl">concluídas</div></div>
    </div>`;

    // Progress
    h += `<div class="progress-block">
      <div class="prog-row"><span>Progresso do treino</span><span>${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill pf-${t}" style="width:${pct}%"></div></div>
    </div>`;

    // Exercises
    h += `<div class="slabel">Exercícios</div>`;
    w.exercises.forEach((ex, i) => {
      const k = `${current}-${i}`;
      const isDone = !!checked[k];
      const numCls = `n-${t}`;
      const pillCls = `p-${t}`;
      const chkCls = isDone ? (t==='push'?'cp':'cl') : '';
      h += `<div class="ex${isDone?' done':''}" id="c-${k}">
        <div class="ex-main">
          <div class="ex-n ${numCls}">${String(i+1).padStart(2,'0')}</div>
          <div class="ex-body">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-cue">${ex.cue}</div>
          </div>
          <div class="ex-pills">
            <span class="pill p-sets">${ex.sets} séries</span>
            <span class="pill ${pillCls}">${ex.reps} reps</span>
          </div>
        </div>
        <div class="ex-foot">
          <div class="ex-tip">💡 ${ex.tip}</div>
          <button class="chk${chkCls?' '+chkCls:''}" onclick="toggle('${current}','${i}','${t}')" aria-label="Marcar feito">✓</button>
        </div>
      </div>`;
    });

    if (w.rest) {
      h += `<div class="info-box">
        <div class="info-label">⏱ Descanso entre séries</div>
        <div class="info-text">${w.rest}</div>
      </div>`;
    }
  }

  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function show(d) {
  current = d;
  buildWeekStrip();
  buildTabs();
  buildContent();
  document.getElementById('content').scrollTop = 0;
}

function toggle(dayKey, idx, type) {
  const k = `${dayKey}-${idx}`;
  checked[k] ? delete checked[k] : (checked[k] = true);
  show(dayKey);
}

// Init
show(todayKey);
</script>
</body>
</html>
